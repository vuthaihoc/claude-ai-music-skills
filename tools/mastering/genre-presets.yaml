# Genre-Specific Mastering Presets
#
# Each genre defines (all optional — unset fields inherit from defaults):
#   target_lufs          - Loudness target (streaming standard: -14, dynamic genres: -16 to -18)
#   cut_highmid          - EQ cut in dB at eq_highmid_freq to tame harshness (negative = cut, 0 = none)
#   cut_highs            - High shelf cut in dB at eq_highs_freq (negative = cut, 0 = none)
#   compress_ratio       - Compression ratio (1.0 = bypass, default 1.5 = gentle glue)
#   compress_threshold   - Compression threshold in dB (default -18.0)
#   compress_attack      - Compression attack in ms (default 30.0)
#   compress_release     - Compression release in ms (default 200.0)
#   eq_highmid_freq      - High-mid EQ center frequency in Hz (default 3500.0)
#   eq_highmid_q         - High-mid EQ Q factor (default 1.5)
#   eq_highs_freq        - High shelf frequency in Hz (default 8000.0)
#   eq_highs_q           - High shelf Q factor (default 0.7)
#   eq_low_freq          - Low shelf center frequency in Hz (default 80.0)
#   eq_low_gain          - Low shelf gain in dB (positive = boost, negative = cut, 0 = bypass)
#   eq_low_q             - Low shelf Q factor (default 0.7)
#   eq_sub_cut_freq      - Sub-bass HPF frequency in Hz (0 = bypass, removes rumble below this)
#   stereo_width         - Stereo width multiplier (0.0 = mono, 1.0 = unchanged, >1.0 = wider)
#   stereo_bass_mono_freq - Mono-sum below this frequency in Hz (0 = bypass, bass coherence)
#   output_bits            - Output bit depth (16 or 24, default 24 for streaming delivery)
#   dither_bits            - Dither bit depth (default: follows output_bits)
#   limiter_lookahead_ms   - Look-ahead buffer in ms (0 = reactive, default 5.0)
#   limiter_release_ms     - Limiter release time in ms (default 50.0)
#   compress_mix           - Compression wet/dry blend (0.0=dry, 1.0=wet, default 1.0)
#   compress_makeup        - Compression makeup gain in dB (0 = off, default 0)
#   processing_oversample  - Oversample factor for nonlinear stages (1/2/4, default 1)
#   target_lra             - Target loudness range in LU (0 = disable, default 0)
#   dc_filter_freq         - DC offset HPF frequency in Hz (0 = bypass, default 5.0)
#   output_sample_rate     - Target sample rate (default 96000 for streaming; 0 = fall back to mastering.delivery_sample_rate)
#   deess_enabled          - Enable de-esser (0 = off, 1 = on, default 0)
#   deess_freq             - De-esser center frequency in Hz (default 6500)
#   deess_bandwidth        - De-esser bandwidth in Hz (default 4000)
#   deess_threshold        - De-esser threshold in dB (default -20.0)
#   deess_ratio            - De-esser compression ratio (default 4.0)
#   track_gap              - Silence to prepend per track in seconds (default 0)
#   multiband_enabled      - Enable 3-band multiband compression (0=off, 1=on, default 0)
#   multiband_low_crossover  - Low/mid crossover in Hz (default 200)
#   multiband_high_crossover - Mid/high crossover in Hz (default 5000)
#   multiband_low_ratio    - Low band compression ratio (default 1.5)
#   multiband_mid_ratio    - Mid band compression ratio (default 1.5)
#   multiband_high_ratio   - High band compression ratio (default 1.5)
#   multiband_low_threshold  - Low band threshold in dB (default -18)
#   multiband_mid_threshold  - Mid band threshold in dB (default -18)
#   multiband_high_threshold - High band threshold in dB (default -18)
#   midside_low_gain       - Side channel low shelf gain in dB (default 0, negative = narrower bass)
#   midside_low_freq       - Side channel low shelf frequency (default 300)
#   midside_high_gain      - Side channel high shelf gain in dB (default 0, positive = wider highs)
#   midside_high_freq      - Side channel high shelf frequency (default 8000)
#   click_peak_ratio       - QC click detector: peak-to-RMS ratio above which a 10ms window
#                            counts as a click (default 6.0). Raise for genres with intentional
#                            sharp transients (e.g., 8.0–10.0 for electronic/IDM/metal).
#   click_fail_count       - QC click detector: absolute click count above which clicks FAIL
#                            (default 3). Raise alongside peak_ratio for dense-transient genres.
#   silence_leading_max_s  - QC silence check: leading silence longer than this duration (s)
#                            FAILs. Default 0.5. Raise (e.g. 1.5) for genres whose intros
#                            open with filter sweeps / builds (electronic, EDM, progressive).
#   silence_trailing_max_s - QC silence check: trailing silence longer than this duration (s)
#                            WARNs. Default 3.0.
#   codec_preview_enabled  - Render a 128 kbps AAC .aac.m4a next to each master in
#                            mastering_samples/ for operator Bluetooth audition (issue #296).
#                            1 = on (default), 0 = off.
#   codec_preview_bitrate_kbps - AAC bitrate for the preview (default 128).
#   mono_fold_enabled      - Run the mono fold-down QC gate during mastering (issue #296).
#                            Writes {track}.MONO_FOLD.md + {track}.mono.wav sample to
#                            mastering_samples/. 1 = on (default), 0 = off.
#   mono_fold_write_audio  - Write the .mono.wav sample alongside the report (1 = on,
#                            default). Set to 0 for report-only.
#   mono_fold_band_drop_fail_db - Hard-fail threshold for per-band drop (stereo vs. mono)
#                            in dB. Default 6.0 — raise to 8–10 for ambient/cinematic
#                            genres that intentionally use wide-stereo cancellation.
#   mono_fold_lufs_warn_db - Warn threshold for integrated LUFS delta (default 3.0 dB).
#   mono_fold_vocal_warn_db - Warn threshold for vocal-band (1–4 kHz) RMS delta (default 2.0 dB).
#   mono_fold_correlation_warn - Warn threshold for stereo correlation coefficient (default 0.3).
#   genre_ideal_lra_lu     - Target loudness-range (LU) used by the album-mastering
#                            anchor selector (#290 phase 2). Tracks whose LRA is
#                            close to this score higher on mix_quality. Default 8.0
#                            matches balanced pop; dynamic genres override upward.
#   spectral_reference_energy - 7-band reference curve (sub_bass / bass / low_mid /
#                            mid / high_mid / high / air) as percentages of total
#                            spectral energy, summing to 100. Anchor selector
#                            compares each track's band_energy to this curve via
#                            Euclidean distance. Genre overrides merge key-by-key;
#                            missing keys inherit from defaults.
#   coherence_stl_95_lu    - Max |track.stl_95 - anchor.stl_95| (LU) before
#                            the track is classified an STL-95 outlier by
#                            album_coherence_check (#290 phase 3b). Default 0.5.
#   coherence_lra_floor_lu - Minimum short_term_range (LU) allowed; tracks
#                            below trip an LRA-floor violation regardless of
#                            anchor. Default 1.0.
#   coherence_low_rms_db   - Max |delta_low_rms| (dB) before low-RMS outlier.
#                            Default 2.0.
#   coherence_vocal_rms_db - Max |delta_vocal_rms| (dB) before vocal-RMS outlier.
#                            Default 2.0.
#
# Override per-user: copy to {overrides}/mastering-presets.yaml and edit.
# User overrides merge on top of these defaults (genre-level).

# Default settings applied when no genre is specified
defaults:
  target_lufs: -14.0
  cut_highmid: 0
  cut_highs: 0
  compress_ratio: 1.5
  compress_threshold: -18.0
  compress_attack: 30.0
  compress_release: 200.0
  eq_highmid_freq: 3500.0
  eq_highmid_q: 1.5
  eq_highs_freq: 8000.0
  eq_highs_q: 0.7
  eq_low_freq: 80.0
  eq_low_gain: 0
  eq_low_q: 0.7
  eq_sub_cut_freq: 0
  stereo_width: 1.0
  stereo_bass_mono_freq: 0
  output_bits: 24
  dither_bits: 24
  limiter_lookahead_ms: 5.0
  limiter_release_ms: 50.0
  compress_mix: 1.0
  compress_makeup: 0
  processing_oversample: 1
  target_lra: 0
  dc_filter_freq: 5.0
  output_sample_rate: 96000
  deess_enabled: 0
  deess_freq: 6500
  deess_bandwidth: 4000
  deess_threshold: -20.0
  deess_ratio: 4.0
  track_gap: 0
  multiband_enabled: 0
  multiband_low_crossover: 200
  multiband_high_crossover: 5000
  multiband_low_ratio: 1.5
  multiband_mid_ratio: 1.5
  multiband_high_ratio: 1.5
  multiband_low_threshold: -18.0
  multiband_mid_threshold: -18.0
  multiband_high_threshold: -18.0
  midside_low_gain: 0
  midside_low_freq: 300
  midside_high_gain: 0
  midside_high_freq: 8000
  eq_linear_phase: 0
  click_peak_ratio: 6.0
  click_fail_count: 3
  codec_preview_enabled: 1
  codec_preview_bitrate_kbps: 128
  mono_fold_enabled: 1
  mono_fold_write_audio: 1
  mono_fold_band_drop_fail_db: 6.0
  mono_fold_lufs_warn_db: 3.0
  mono_fold_vocal_warn_db: 2.0
  mono_fold_correlation_warn: 0.3

  # Album-mastering anchor selector (#290 phase 2) — pop defaults
  genre_ideal_lra_lu: 8.0
  spectral_reference_energy:
    sub_bass: 8.0
    bass:     18.0
    low_mid:  20.0
    mid:      25.0
    high_mid: 14.0
    high:     10.0
    air:       5.0

  # Album-mastering coherence tolerance bands (#290 phase 3b).
  # Used by album_coherence_check / album_coherence_correct to classify
  # outlier tracks relative to the selected anchor. All thresholds are
  # absolute-value deltas from the anchor unless otherwise noted.
  coherence_stl_95_lu: 0.5         # ±LU around anchor's STL-95
  coherence_lra_floor_lu: 1.0      # minimum short_term_range allowed (absolute)
  coherence_low_rms_db: 2.0        # ±dB around anchor's low_rms
  coherence_vocal_rms_db: 2.0      # ±dB around anchor's vocal_rms

