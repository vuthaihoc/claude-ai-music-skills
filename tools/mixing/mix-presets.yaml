    mud_freq: 250
    presence_boost_db: 1.0
    presence_freq: 3500
    high_tame_db: -1.0
    high_tame_freq: 9000
    stereo_width: 1.25
    compress_threshold_db: -18.0
    compress_ratio: 1.5
    compress_attack_ms: 20.0
    gain_db: 0.0
    saturation_drive: 0
    lowpass_cutoff: 20000
    excitation_db: 0.0
    excitation_db_when_dark: 2.0
  brass:
    click_removal: true
    highpass_cutoff: 60
    mud_cut_db: -2.0
    mud_freq: 300
    presence_boost_db: 1.5
    presence_freq: 2000
    high_tame_db: -2.0
    high_tame_freq: 7000
    compress_threshold_db: -14.0
    compress_ratio: 2.5
    compress_attack_ms: 10.0
    gain_db: 0.0
    saturation_drive: 0
    lowpass_cutoff: 20000
    excitation_db: 0.0
    excitation_db_when_dark: 1.5
  woodwinds:
    click_removal: true
    highpass_cutoff: 50
    mud_cut_db: -1.5
    mud_freq: 250
    presence_boost_db: 1.0
    presence_freq: 2500
    high_tame_db: -1.0
