    presence_boost_db: 1.0
    presence_freq: 2500
    high_tame_db: -1.5
    high_tame_freq: 9000
    stereo_width: 1.1
    compress_threshold_db: -16.0
    compress_ratio: 2.0
    compress_attack_ms: 15.0
    gain_db: 0.0
    saturation_drive: 0
    lowpass_cutoff: 20000
    excitation_db: 0.0
    excitation_db_when_dark: 1.5
  strings:
    click_removal: true
    highpass_cutoff: 35
