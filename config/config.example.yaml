# =============================================================================
# bitwize-music Plugin Configuration
# =============================================================================
#
# QUICK START — Only 3 required fields:
#
#   artist:
#     name: "your-artist-name"
#   paths:
#     content_root: "~/music-projects"
#     audio_root: "~/music-projects/audio"
#     documents_root: "~/music-projects/documents"
#
# That's it! Everything else below is optional. Copy this file to
# ~/.bitwize-music/config.yaml and fill in the 3 fields above.
#
# =============================================================================
#
# SETUP:
#   mkdir -p ~/.bitwize-music
#   cp config/config.example.yaml ~/.bitwize-music/config.yaml
#   # Edit ~/.bitwize-music/config.yaml with your settings
#
# Or use the interactive setup: /bitwize-music:configure
#
# WHY ~/.bitwize-music/?
#   - Survives plugin updates (your config is never overwritten)
#   - Same location whether you cloned the repo or installed as plugin
#   - Easy to backup and version control separately
#
# SECTIONS OVERVIEW:
#   [REQUIRED] artist:      Your artist name (used in all file paths)
#   [REQUIRED] paths:       Where files are stored (content, audio, documents)
#   [optional] urls:        Your streaming platform links
#   [optional] generation:  Music generation service settings
#   [optional] promotion:   Promo video generation settings
#   [optional] sheet_music: Sheet music generation settings
#   [optional] cloud:       Cloud storage for uploads
#   [optional] database:    PostgreSQL database for tweet/promo management
#
# =============================================================================


# =============================================================================
# ARTIST [REQUIRED]
# =============================================================================
# Your artist identity. Used for file paths and metadata.
# The 'name' field is required - everything else is optional.

artist:
  # ---------------------------
  # name [REQUIRED]
  # ---------------------------
  # Your artist or project name. Used in directory paths.
  #
  # IMPORTANT:
  #   - Case-sensitive: "bitwize" and "Bitwize" create different folders
  #   - Use lowercase-with-hyphens for consistency: "my-band" not "My Band"
  #   - No spaces - use hyphens: "dj-shadow-clone" not "dj shadow clone"
  #
  # Examples:
  #   name: "bitwize"           # Solo artist
  #   name: "the-synthetics"    # Band name
  #   name: "dj-neon"           # DJ alias
  #
  # Creates paths like:
  #   {content_root}/artists/bitwize/albums/electronic/my-album/
  #   {audio_root}/artists/bitwize/albums/{genre}/my-album/
  #
  name: "your-artist-name"

  # ---------------------------
  # genres [optional]
  # ---------------------------
  # Your primary genres. Used as defaults when creating new albums.
  # The plugin supports 64+ subgenres (see /genres/ directory).
  #
  # Primary genre categories:
  #   hip-hop, electronic, rock, folk, country, pop, metal, jazz, rnb,
  #   classical, reggae, punk, indie-folk, blues, gospel, latin, k-pop
  #
  # Examples:
  #   genres: ["electronic"]                    # Single genre artist
  #   genres: ["hip-hop", "electronic"]         # Multi-genre artist
  #   genres: ["folk", "country", "americana"]  # Related genres
  #
  genres:
    - "electronic"
    - "hip-hop"

  # ---------------------------
  # style [optional]
  # ---------------------------
  # Brief description of your sound. Helps Claude understand your aesthetic
  # and make better suggestions for lyrics, production, and prompts.
  #
  # Be specific about:
  #   - Mood/tone: dark, uplifting, melancholic, aggressive
  #   - Production style: lo-fi, polished, raw, atmospheric
  #   - Vocal approach: raspy, smooth, spoken word, falsetto
  #   - Influences: (describe style, don't name artists)
  #
  # Examples:
  #   style: "dark industrial electronic with aggressive vocals"
  #   style: "storytelling folk with fingerpicked acoustic guitar"
  #   style: "boom-bap hip-hop with jazz samples and conscious lyrics"
  #   style: "synthwave with retro 80s production and emotional hooks"
  #
  # Uncomment to enable:
  # style: "dark industrial electronic with aggressive vocals"

  # ---------------------------
  # copyright_holder [optional]
  # ---------------------------
  # Copyright owner for embedded audio metadata. Defaults to artist.name
  # when omitted. Used by the mastering pipeline when writing ID3/BWF tags.
  #
  # copyright_holder: "Your Legal Name or Label LLC"

  # ---------------------------
  # label [optional]
  # ---------------------------
  # Record label name for embedded audio metadata. Defaults to artist.name
  # when omitted. Self-released artists can leave this unset.
  #
  # label: "Your Label"


# =============================================================================
# PATHS [REQUIRED]
# =============================================================================
# Where your files are stored. All three main paths are required.
# All paths support ~ for home directory expansion.
#
# STRUCTURE OVERVIEW:
#   {content_root}/artists/[artist]/albums/[genre]/[album]/  <- Album files
#   {audio_root}/artists/[artist]/albums/[genre]/[album]/    <- Mastered audio
#   {documents_root}/artists/[artist]/albums/[genre]/[album]/ <- PDFs/sources
#
# IMPORTANT: All paths mirror the content structure with artists/[artist]/albums/[genre]/
# Wrong: {audio_root}/my-album/
# Right: {audio_root}/artists/bitwize/albums/hip-hop/my-album/
#
# PLATFORM-SPECIFIC EXAMPLES:
#
# macOS:
#   content_root: "~/Music/bitwize-music"
#   audio_root: "~/Music/bitwize-music/audio"
#   documents_root: "~/Documents/bitwize-music"
#
# Linux:
#   content_root: "~/music/bitwize-music"
#   audio_root: "~/music/bitwize-music/audio"
#   documents_root: "~/documents/bitwize-music"
#
# WSL (Windows Subsystem for Linux):
#   content_root: "/mnt/c/Users/YourName/Music/bitwize-music"
#   audio_root: "/mnt/c/Users/YourName/Music/bitwize-music/audio"
#   documents_root: "/mnt/c/Users/YourName/Documents/bitwize-music"
#
# Shared location (all in one folder):
#   content_root: "~/bitwize-music"
#   audio_root: "~/bitwize-music/audio"
#   documents_root: "~/bitwize-music/documents"

paths:
  # ---------------------------
  # content_root [REQUIRED]
  # ---------------------------
  # Where albums, artists, and research files live.
  # This is your main workspace - markdown files, lyrics, concepts.
  # Typically version-controlled (git).
  #
  # Structure created:
  #   {content_root}/
  #   ├── IDEAS.md                              # Album ideas backlog
  #   ├── artists/
  #   │   └── [artist]/
  #   │       ├── README.md                     # Artist profile
  #   │       └── albums/
  #   │           └── [genre]/
  #   │               └── [album]/
  #   │                   ├── README.md         # Album concept
  #   │                   ├── RESEARCH.md       # Research notes
  #   │                   ├── SOURCES.md        # Citations
  #   │                   └── tracks/
  #   │                       ├── 01-track.md
  #   │                       └── 02-track.md
  #   └── overrides/                            # Custom override files
  #
  # Must be writable. Will create directories as needed.
  #
  content_root: "~/music-projects"

  # ---------------------------
  # audio_root [REQUIRED]
  # ---------------------------
  # Where mastered audio files and album art go.
  # Contains large binary files (WAV, PNG) - typically NOT in git.
  #
  # Structure created (mirrors content structure):
  #   {audio_root}/
  #   └── artists/
  #       └── [artist]/
  #           └── albums/
  #               └── [genre]/
  #                   └── [album]/
  #                       ├── album.png        # Album artwork
  #                       ├── 01-track.wav     # Mastered audio
  #                       └── 02-track.wav
  #
  # COMMON MISTAKE: Using a flat path without the full structure!
  #   Wrong path: ~/music-projects/audio/my-album/
  #   Right path: ~/music-projects/audio/artists/bitwize/albums/{genre}/my-album/
  #
  # Size considerations:
  #   - Each mastered WAV: ~50-100 MB
  #   - Full album: ~500 MB - 1 GB
  #   - Consider an external drive for large catalogs
  #
  audio_root: "~/music-projects/audio"

  # ---------------------------
  # documents_root [REQUIRED]
  # ---------------------------
  # Where PDFs and primary source documents go.
  # For research-heavy albums: court documents, SEC filings, articles.
  # Too large for git - store separately.
  #
  # Structure created (mirrors content structure):
  #   {documents_root}/
  #   └── artists/
  #       └── [artist]/
  #           └── albums/
  #               └── [genre]/
  #                   └── [album]/
  #                       ├── indictment.pdf
  #                       ├── sec-filing.pdf
  #                       └── news-article.pdf
  #
  # If you don't make research-based albums, this can be the same as
  # content_root - the folder just won't be used much.
  #
  documents_root: "~/music-projects/documents"

  # ---------------------------
  # overrides [optional]
  # ---------------------------
  # Directory for override files that customize skills and workflows.
  # Default (if omitted): {content_root}/overrides
  #
  # See config/README.md for the full list of override files and examples.
  #
  overrides: "~/music-projects/overrides"

  # ---------------------------
  # ideas_file [optional]
  # ---------------------------
  # File for tracking album concepts before creating album directories.
  # Managed by /bitwize-music:album-ideas skill.
  #
  # Default (if omitted): {content_root}/IDEAS.md
  #
  # If the file doesn't exist, the skill creates it with a template.
  # Great for capturing inspiration before committing to a full album.
  #
  ideas_file: "~/music-projects/IDEAS.md"

  # ---------------------------
  # tools_root (automatic)
  # ---------------------------
  # Always ~/.bitwize-music (where this config lives).
  # Contains shared tools, not user-configurable.
  #
  # Structure:
  #   ~/.bitwize-music/
  #   ├── config.yaml       # This file
  #   ├── venv/             # Python venv for plugin tools
  #   └── cache/            # Temporary files


# =============================================================================
# PLATFORM URLS [optional]
# =============================================================================
# Your streaming and social platform URLs.
# Used in release workflows, README generation, and announcements.
#
# Only fill in platforms you actually use.
# All fields are optional - leave out or comment out unused ones.

urls:
  # Your website (used in sheet music footers and title pages)
  # website: "https://your-artist.com"

  # Primary platforms
  soundcloud: "https://soundcloud.com/your-artist"

  # Streaming platforms (uncomment and fill in as needed)
  # spotify: "https://open.spotify.com/artist/your-spotify-id"
  # apple_music: "https://music.apple.com/us/artist/your-artist/123456789"
  # bandcamp: "https://your-artist.bandcamp.com"
  # youtube_music: "https://music.youtube.com/channel/your-channel-id"

  # Social platforms
  # youtube: "https://youtube.com/@your-artist"
  # twitter: "https://x.com/your-artist"
  # instagram: "https://instagram.com/your-artist"
  # tiktok: "https://tiktok.com/@your-artist"

  # Other platforms
  # linktree: "https://linktr.ee/your-artist"


# =============================================================================
# GENERATION SERVICE [optional]
# =============================================================================
# Music generation service configuration.
# Defaults to Suno if not specified.

generation:
  # ---------------------------
  # service [optional]
  # ---------------------------
  # Which AI music generation service to use.
  #
  # Default (if omitted): suno
  #
  # Currently supported:
  #   suno    - Suno V5 (default, recommended)
  #
  # Future support planned:
  #   udio    - Udio
  #   soundraw - SoundRaw
  #
  # Each service has dedicated reference docs in /reference/{service}/
  # and a specialized skill: /bitwize-music:{service}-engineer
  #
  service: suno

  # ---------------------------
  # require_suno_link_for_final [optional]
  # ---------------------------
  # Whether a Suno link must be set before marking a track as Final.
  # When true, Generated → Final is blocked until a Suno link is recorded.
  # This ensures every Final track has proof of generation.
  #
  # Default (if omitted): true
  #
  # Set to false if you generate outside Suno or don't track generation links.
  #
  # require_suno_link_for_final: true

  # ---------------------------
  # max_lyric_words [optional]
  # ---------------------------
  # Maximum word count for lyrics before generation is blocked.
  # Suno V5 has a practical limit of ~800 words — lyrics beyond this
  # are compressed or skipped during generation.
  #
  # Default (if omitted): 800
  #
  # Adjust if your generation service supports longer lyrics, or lower
  # it if you want to enforce tighter lyric density.
  #
  # max_lyric_words: 800

  # ---------------------------
  # require_source_path_for_documentary [optional]
  # ---------------------------
  # Whether documentary albums (those with SOURCES.md) must follow the
  # full source verification path: Concept → Research Complete →
  # Sources Verified → In Progress.
  #
  # When true, Concept → In Progress is blocked for albums with SOURCES.md.
  # This prevents accidentally skipping research verification.
  #
  # Default (if omitted): true
  #
  # Set to false if you use SOURCES.md for non-documentary purposes
  # (e.g., sample credits) and don't need the verification workflow.
  #
  # require_source_path_for_documentary: true

  # ---------------------------
  # additional_genres [optional]
  # ---------------------------
  # Extra genres to accept when creating albums, beyond the built-in list.
  #
  # Built-in genres:
  #   blues, classical, country, electronic, folk, gospel, hip-hop,
  #   indie-folk, jazz, k-pop, latin, metal, pop, punk, reggae, rnb, rock
  #
  # Use this for subgenres or niche genres your project needs.
  # Values should be lowercase-with-hyphens (slug format).
  #
  # Examples:
  #   additional_genres: ["synthwave", "lo-fi", "boom-bap", "drill"]
  #   additional_genres: ["americana", "bluegrass"]
  #
  # additional_genres: []


# =============================================================================
# PROMO VIDEOS [optional]
# =============================================================================
# Settings for /bitwize-music:promo-director skill.
# Generate 15-second vertical videos (9:16) for social media.
#
# REQUIREMENTS:
#   - ffmpeg with filters support
#   - Python 3.8+ with PIL
#   - Album artwork (cover.png)
#
# Skip this section entirely if you don't plan to make promo videos.
# All settings have sensible defaults.
#
# Uncomment to customize:

# promotion:
  # ---------------------------
  # default_style [optional]
  # ---------------------------
  # Visualization style for audio waveform display.
  #
  # Default (if omitted): "pulse"
  #
  # Options and recommended genres:
  #   pulse      - Pulsing circle (electronic, hip-hop)
  #   bars       - Frequency bars (pop, rock)
  #   line       - Waveform line (acoustic, folk)
  #   mirror     - Mirrored waveform (ambient, chill)
  #   mountains  - Mountain-like peaks (cinematic, epic)
  #   colorwave  - Flowing colors (psychedelic, experimental)
  #   neon       - Neon glow effect (synthwave, 80s)
  #   dual       - Split left/right (stereo showcase)
  #   circular   - Circular display (EDM, dance)
  #
  # default_style: "pulse"

  # ---------------------------
  # duration [optional]
  # ---------------------------
  # Video duration in seconds.
  #
  # Default (if omitted): 15
  #
  # Platform recommendations:
  #   15  - Instagram Reels, Twitter (optimal)
  #   30  - TikTok, YouTube Shorts
  #   60  - Longer previews
  #
  # duration: 15

  # ---------------------------
  # include_sampler [optional]
  # ---------------------------
  # Generate an album sampler video (clips from all tracks).
  # Great for album announcements.
  #
  # Default (if omitted): false
  #
  # include_sampler: true

  # ---------------------------
  # sampler_clip_duration [optional]
  # ---------------------------
  # Seconds per track in the sampler video.
  # Keep short to fit more tracks (Twitter limit: 140s).
  #
  # Default (if omitted): 12
  #
  # sampler_clip_duration: 12


# =============================================================================
# SHEET MUSIC [optional]
# =============================================================================
# Settings for /bitwize-music:sheet-music-publisher skill.
# Convert audio to sheet music and create songbooks.
#
# REQUIREMENTS:
#   - AnthemScore ($42 one-time, or free trial)
#   - MuseScore (free, open source)
#
# BEST FOR: Melodic tracks, folk, acoustic, piano-based
# CHALLENGING: Dense electronic, heavy distortion, complex polyrhythms
#
# Skip this section if you don't need sheet music.

sheet_music:
  # ---------------------------
  # enabled [optional]
  # ---------------------------
  # Master switch for sheet music pipeline.
  # Set false to disable sheet music generation entirely.
  # When false, sheet-music-publisher skill will skip gracefully.
  #
  # Default (if omitted): true
  #
  # Set to false if you don't have AnthemScore/MuseScore installed
  # and don't want sheet music features offered.
  #
  enabled: true

  # ---------------------------
  # page_size
  # ---------------------------
  # Page size for PDF songbooks.
  #
  # Options:
  #   letter - 8.5 x 11 inches (US standard, home printing)
  #   9x12   - 9 x 12 inches (professional songbook size)
  #   6x9    - 6 x 9 inches (compact/travel size)
  #
  page_size: "letter"

  # ---------------------------
  # section_headers
  # ---------------------------
  # Include [Verse], [Chorus], etc. labels in sheet music.
  # Set true for educational/study purposes.
  # Set false for cleaner professional look.
  #
  section_headers: false

  # ---------------------------
  # footer_url [optional]
  # ---------------------------
  # URL displayed in the footer of every page in singles and songbooks.
  # Also used on the title page of individual singles.
  #
  # Default (if omitted): auto-detected from urls section
  #
  # Examples:
  #   footer_url: "https://www.bitwizemusic.com"
  #   footer_url: "https://your-artist.com"
  #
  # footer_url: "https://www.your-website.com"


# =============================================================================
# CLOUD STORAGE [optional]
# =============================================================================
# Settings for /bitwize-music:cloud-uploader skill.
# Upload promo videos and assets to cloud storage for sharing.
#
# SUPPORTED PROVIDERS:
#   r2  - Cloudflare R2 (recommended: no egress fees, global CDN)
#   s3  - AWS S3 (standard cloud storage)
#
# Skip this entire section if you don't need cloud uploads.
# See /reference/cloud/setup-guide.md for detailed setup instructions.
#
# SECURITY NOTE:
#   Store credentials carefully. This file may be version-controlled.
#   Consider environment variables for sensitive values.
#
# Uncomment to enable:

# cloud:
  # ---------------------------
  # enabled [required if using cloud]
  # ---------------------------
  # Master switch. Must be true to enable uploads.
  # Set false to temporarily disable without removing config.
  #
  # enabled: true

  # ---------------------------
  # provider [required if using cloud]
  # ---------------------------
  # Cloud storage provider.
  #
  # Options:
  #   r2  - Cloudflare R2 (no egress fees, built-in CDN, recommended)
  #   s3  - AWS S3 (more regions, familiar to AWS users)
  #
  # provider: "r2"

  # ---------------------------
  # public_read [optional]
  # ---------------------------
  # Make uploaded files publicly accessible via URL.
  # Set true for sharing promo videos on social media.
  # Set false for private storage (requires signed URLs).
  #
  # Default (if omitted): false
  #
  # public_read: false

  # ---------------------------
  # Cloudflare R2 Configuration
  # ---------------------------
  # Get credentials: Cloudflare Dashboard > R2 > Manage R2 API Tokens
  #
  # r2:
  #   account_id: "your-32-character-account-id"
  #   access_key_id: "your-r2-access-key-id"
  #   secret_access_key: "your-r2-secret-access-key"
  #   bucket: "promo-videos"
  #   public_url: ""  # Custom domain for public URLs (e.g., "https://cdn.example.com")

  # ---------------------------
  # AWS S3 Configuration
  # ---------------------------
  # Get credentials: AWS Console > IAM > Users > Security credentials
  #
  # s3:
  #   region: "us-west-2"
  #   access_key_id: "AKIAIOSFODNN7EXAMPLE"
  #   secret_access_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
  #   bucket: "my-promo-bucket"


# =============================================================================
# DATABASE [optional]
# =============================================================================
# PostgreSQL database for tweet/promo management.
# Stores social media posts, tracks their publish status, and links them
# to albums and tracks.
#
# REQUIREMENTS:
#   - PostgreSQL server (local or remote)
#   - psycopg2-binary (installed with plugin requirements)
#
# The database complements the markdown-based workflow — markdown files
# remain the source of truth for album/track content, while the database
# stores social media post data and publish state.
#
# SECURITY NOTE:
#   Store credentials carefully. This file should not be version-controlled
#   if it contains real passwords.
#
# Uncomment to enable:

# database:
  # ---------------------------
  # enabled [required if using database]
  # ---------------------------
  # Master switch. Must be true to enable database tools.
  # Set false to temporarily disable without removing config.
  #
  # enabled: true

  # ---------------------------
  # host [required if using database]
  # ---------------------------
  # PostgreSQL server hostname or IP.
  #
  # Examples:
  #   host: "localhost"                         # Local server
  #   host: "postgres.example.com"              # Remote server
  #   host: "/var/run/postgresql"               # Unix socket
  #
  # host: "localhost"

  # ---------------------------
  # port [optional]
  # ---------------------------
  # PostgreSQL server port.
  #
  # Default (if omitted): 5432
  #
  # port: 5432

  # ---------------------------
  # name [required if using database]
  # ---------------------------
  # Database name.
  #
  # name: "your-database"

  # ---------------------------
  # user [required if using database]
  # ---------------------------
  # Database user.
  #
  # user: "your-username"

  # ---------------------------
  # password [required if using database]
  # ---------------------------
  # Database password.
  #
  # password: "your-password"


# =============================================================================
# LOGGING (logging:)
# =============================================================================
# File-based debug logging for development and troubleshooting.
# When enabled, all log output is written to a rotating log file.
# Completely silent when disabled or omitted — no behavior change.
#
# logging:
#
#   # ---------------------------
#   # enabled [required to activate]
#   # ---------------------------
#   # Master switch. Set to true to enable file logging.
#   # When false or omitted, no log file is created.
#   #
#   # enabled: true
#
#   # ---------------------------
#   # level [optional, default: "debug"]
#   # ---------------------------
#   # Minimum log level written to the file.
#   # Options: "debug", "info", "warning", "error"
#   #
#   # level: "debug"
#
#   # ---------------------------
#   # file [optional, default: "~/.bitwize-music/logs/debug.log"]
#   # ---------------------------
#   # Path to the log file. Supports ~ for home directory.
#   # The directory is auto-created if it doesn't exist.
#   #
#   # file: "~/.bitwize-music/logs/debug.log"
#
#   # ---------------------------
#   # max_size_mb [optional, default: 5]
#   # ---------------------------
#   # Maximum size of each log file in megabytes before rotation.
#   #
#   # max_size_mb: 5
#
#   # ---------------------------
#   # backup_count [optional, default: 3]
#   # ---------------------------
#   # Number of rotated log files to keep.
#   # e.g., debug.log, debug.log.1, debug.log.2, debug.log.3
#   #
#   # backup_count: 3


# =============================================================================
# MASTERING [optional]
# =============================================================================
# Streaming-grade mastering defaults for master_album / master_audio /
# polish_and_master_album. All fields are optional — omit any key to
# accept the default.
#
# These values layer ON TOP of genre presets:
#   - Genre presets control *genre-specific* parameters (EQ curves,
#     compression, de-essing).
#   - This block controls *delivery-target* parameters (bit depth,
#     sample rate, loudness, archival).
#
# The mastering pipeline enforces streaming-safe targets by default:
#   - 24-bit WAV at 96 kHz (Apple Hi-Res Lossless + Tidal Max eligibility)
#   - -14 LUFS integrated loudness (Spotify / Apple / Tidal / YouTube)
#   - -1.0 dBTP true peak ceiling (AAC / Opus codec safety margin)
#
# Uncomment individual keys to customize.

# mastering:
#   # ---------------------------
#   # delivery_format [optional, default: "wav"]
#   # ---------------------------
#   # Output container for mastered tracks. Only WAV is supported for
#   # DistroKid single-ingest; other containers are reserved for future
#   # work.
#   #
#   # delivery_format: wav
#
#   # ---------------------------
#   # delivery_bit_depth [optional, default: 24]
#   # ---------------------------
#   # Bit depth for mastered delivery files.
#   #
#   # Options:
#   #   16 — legacy / smaller files / CD master rate
#   #   24 — streaming-grade headroom; required for Apple Hi-Res Lossless
#   #        + Tidal Max
#   #
#   # delivery_bit_depth: 24
#
#   # ---------------------------
#   # delivery_sample_rate [optional, default: 96000]
#   # ---------------------------
#   # Output sample rate in Hz.
#   #
#   # Upsampled from the 44.1 kHz Suno source when >44100. This satisfies
#   # the sample-rate gate for Apple Hi-Res Lossless (>48 kHz strict) and
#   # Tidal Max (>44.1 kHz strict). It does NOT add audio information —
#   # the extra bandwidth above ~22 kHz is empty. See
#   # reference/streaming-mastering-specs.md for the full tradeoff.
#   #
#   # Common values:
#   #   44100 — match Suno source; no badge eligibility.
#   #   48000 — broadcast standard; still below Apple Hi-Res threshold.
#   #   96000 — unlocks Apple Hi-Res Lossless + Tidal Max badges.
#   #
#   # Disk-usage note: at 24-bit / 96 kHz, mastered WAVs are roughly
#   # ~33 MB per stereo minute (vs. ~10 MB at 44.1 kHz). A 12-track
#   # album averages ~1.5 GB of mastered/ output before archival; enable
#   # archival only when you have headroom for an extra ~3x of that.
#   #
#   # delivery_sample_rate: 96000
#
#   # ---------------------------
#   # target_lufs [optional, default: -14.0]
#   # ---------------------------
#   # Integrated loudness target in LUFS. Genre presets override this
#   # per-genre; this is the fallback when no genre is specified.
#   #
#   # target_lufs: -14.0
#
#   # ---------------------------
#   # true_peak_ceiling [optional, default: -1.0]
#   # ---------------------------
#   # True peak ceiling in dBTP. -1.0 is the streaming-safe default —
#   # AAC/Opus codecs generate intersample peaks above 0 dBFS, and a
#   # -1.0 ceiling leaves enough headroom to stay under the codec gate.
#   #
#   # Per-genre opus-safe overrides (-1.5 dBTP for EDM/metal/trap) are
#   # reserved for a later phase; set this value globally for now if
#   # you want the tighter ceiling across all genres.
#   #
#   # true_peak_ceiling: -1.0
#
#   # ---------------------------
#   # archival_enabled [optional, default: false]
#   # ---------------------------
#   # When true, master_album also writes a 32-bit float / 96 kHz
#   # pre-downconvert master to
#   # {audio_root}/artists/[artist]/albums/[genre]/[album]/archival/.
#   # Intent: re-master without re-polishing stems (spec changes,
#   # re-release with different targets). Adds ~1-2 GB per 12-track album.
#   #
#   # Most users should leave this off.
#   #
#   # archival_enabled: false
#
#   # ---------------------------
#   # adm_aac_encoder [optional, default: "aac"]
#   # ---------------------------
#   # AAC encoder used for Apple Digital Masters (ADM) validation.
#   # Consumed by the validate_adm pipeline step (ships in a later phase).
#   #
#   # Options:
#   #   aac         — native ffmpeg AAC encoder; ships everywhere,
#   #                 spec-equivalent for the zero-clip validation test.
#   #   libfdk_aac  — Fraunhofer FDK AAC; closer parity to Apple's
#   #                 encoder. Requires a non-free ffmpeg build
#   #                 (--enable-libfdk_aac).
#   #
#   # adm_aac_encoder: aac
#
#   # ---------------------------
#   # adm_validation_enabled [optional, default: false]
#   # ---------------------------
#   # When true, master_album runs the ADM (Apple Digital Masters)
#   # validation stage — encodes each mastered track to AAC, decodes,
#   # and scans for inter-sample peaks above the true-peak ceiling.
#   # If clips are found, the adaptive retry loop tightens the ceiling
#   # up to 2 additional times.
#   #
#   # Cost: each cycle re-masters every track, so on a 10-track album
#   # this adds ~10-12 minutes per cycle (up to ~30-36 min in the worst
#   # case). Default OFF — opt in per album when preparing for Apple
#   # Hi-Res Lossless / ADM submission, or when you need provable
#   # zero-clip delivery. Normal streaming-target mastering doesn't
#   # need it.
#   #
#   # adm_validation_enabled: false


